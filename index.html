<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recrutement 10NITE Faction</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: #111827;
      padding: 30px;
      border-radius: 15px;
      width: 400px;
      max-width: 100%;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #38bdf8;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      background: #1f2937;
      color: white;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover:not(:disabled) {
      background: #16a34a;
    }
    button:disabled {
      background: #6b7280;
      cursor: not-allowed;
    }
    .anti-spam-badge {
      background: #7c2d12;
      border: 1px solid #ea580c;
      border-radius: 20px;
      padding: 8px 15px;
      text-align: center;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: bold;
      color: #fdba74;
    }
    .anti-spam-badge span {
      color: #f97316;
      font-size: 18px;
      margin-right: 5px;
    }
    .timer-text {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #fbbf24;
      display: none;
      font-weight: bold;
    }
    .error-message {
      background: #7f1d1d;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
      display: none;
      font-size: 14px;
    }
    .success-message {
      background: #14532d;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
      display: none;
      font-size: 14px;
    }
    .cooldown-bar {
      height: 6px;
      background: #374151;
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }
    .cooldown-progress {
      width: 0%;
      height: 100%;
      background: #f97316;
      transition: width 0.1s linear;
    }
    .info-text {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔫 10NITE Faction</h1>
    
    <!-- BANNEAU ANTI-SPAM VISIBLE -->
    <div class="anti-spam-badge">
      <span>🛡️</span> ANTI-SPAM : 60 secondes de délai entre chaque candidature <span>⏱️</span>
    </div>
    
    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>
    
    <form id="candidatureForm">
      <label>👤 Pseudo Paladium</label>
      <input id="pseudo" type="text" required placeholder="Votre pseudo">

      <label>🎂 Âge</label>
      <input id="age" type="number" min="10" max="99" maxlength="2" required oninput="this.value = this.value.slice(0,2)" placeholder="10-99 ans">

      <label>💬 Discord</label>
      <input id="discord" type="text" placeholder="Pseudo#1234" required>

      <label>🎮 Rôle sur Paladium</label>
      <select id="role" required>
        <option value="">-- Choisir --</option>
        <option>Farmeur</option>
        <option>Pilleur</option>
        <option>Builder</option>
      </select>

      <label>⚔️ Que ferais-tu en cas de pillage sur la base ?</label>
      <select id="pillage" required>
        <option value="">-- Choisir --</option>
        <option>Prévenir le serveur discord puis attaquer le wither et les joueurs</option>
        <option>Attaquer le wither ou les joueurs</option>
      </select>

      <label>🔥 Pourquoi rejoindre cette Faction et pas une autre ?</label>
      <textarea id="motivation" required placeholder="Expliquez votre motivation..."></textarea>

      <button type="submit" id="submitBtn">📩 Envoyer la candidature</button>
      <div id="timerText" class="timer-text"></div>
      <div id="cooldownBar" class="cooldown-bar">
        <div id="cooldownProgress" class="cooldown-progress"></div>
      </div>
      <div class="info-text">⏳ Une candidature toutes les 60 secondes maximum</div>
    </form>
  </div>

  <script>
    const webhookURL = "https://discord.com/api/webhooks/1490409580910608445/8vmqps_OxmINl7cUFm3UyaEODrg2l_1nc6EwUqUUMWBvai7kme3I4gc0Quj_uvJpgkvs";
    
    // Configuration du cooldown (60 secondes)
    const COOLDOWN_SECONDS = 60;
    const STORAGE_KEY = "10nite_last_submission_time";
    
    let cooldownInterval = null;
    let remainingSeconds = 0;
    let isSubmitting = false;

    function getLastSubmissionTime() {
      const stored = localStorage.getItem(STORAGE_KEY);
      return stored ? parseInt(stored) : 0;
    }

    function setLastSubmissionTime() {
      localStorage.setItem(STORAGE_KEY, Date.now());
    }

    function isInCooldown() {
      const lastTime = getLastSubmissionTime();
      const now = Date.now();
      return (now - lastTime) < (COOLDOWN_SECONDS * 1000);
    }

    function getRemainingCooldownSeconds() {
      const lastTime = getLastSubmissionTime();
      const now = Date.now();
      const elapsed = (now - lastTime) / 1000;
      const remaining = Math.max(0, COOLDOWN_SECONDS - elapsed);
      return Math.ceil(remaining);
    }

    function formatTime(seconds) {
      const secs = seconds % 60;
      return `${secs} secondes`;
    }

    function updateCooldownDisplay() {
      const submitBtn = document.getElementById("submitBtn");
      const timerText = document.getElementById("timerText");
      const cooldownBar = document.getElementById("cooldownBar");
      const cooldownProgress = document.getElementById("cooldownProgress");
      
      if (isInCooldown()) {
        const remaining = getRemainingCooldownSeconds();
        const progressPercent = (remaining / COOLDOWN_SECONDS) * 100;
        
        submitBtn.disabled = true;
        submitBtn.textContent = "⏳ Délai anti-spam en cours...";
        timerText.style.display = "block";
        cooldownBar.style.display = "block";
        timerText.innerHTML = `🛡️ ANTI-SPAM : Veuillez patienter ${formatTime(remaining)} avant une nouvelle candidature ⏳`;
        cooldownProgress.style.width = `${100 - progressPercent}%`;
        
        remainingSeconds = remaining;
        
        if (!cooldownInterval) {
          cooldownInterval = setInterval(() => {
            if (remainingSeconds <= 1) {
              clearInterval(cooldownInterval);
              cooldownInterval = null;
              submitBtn.disabled = false;
              submitBtn.textContent = "📩 Envoyer la candidature";
              timerText.style.display = "none";
              cooldownBar.style.display = "none";
            } else {
              remainingSeconds--;
              const newProgress = (remainingSeconds / COOLDOWN_SECONDS) * 100;
              timerText.innerHTML = `🛡️ ANTI-SPAM : Veuillez patienter ${formatTime(remainingSeconds)} avant une nouvelle candidature ⏳`;
              cooldownProgress.style.width = `${100 - newProgress}%`;
            }
          }, 1000);
        }
      } else {
        submitBtn.disabled = false;
        submitBtn.textContent = "📩 Envoyer la candidature";
        timerText.style.display = "none";
        cooldownBar.style.display = "none";
        if (cooldownInterval) {
          clearInterval(cooldownInterval);
          cooldownInterval = null;
        }
      }
    }

    function showMessage(type, text) {
      const errorDiv = document.getElementById("errorMessage");
      const successDiv = document.getElementById("successMessage");
      
      errorDiv.style.display = "none";
      successDiv.style.display = "none";
      
      if (type === "error") {
        errorDiv.innerHTML = text;
        errorDiv.style.display = "block";
      } else if (type === "success") {
        successDiv.innerHTML = text;
        successDiv.style.display = "block";
      }
      
      setTimeout(() => {
        if (type === "error") {
          errorDiv.style.display = "none";
        } else {
          successDiv.style.display = "none";
        }
      }, 5000);
    }

    function validateAge(age) {
      const ageNum = parseInt(age);
      if (isNaN(ageNum) || ageNum < 10 || ageNum > 99) {
        return false;
      }
      return true;
    }

    async function sendForm(event) {
      event.preventDefault();
      
      if (isSubmitting) {
        showMessage("error", "⏳ Envoi en cours, veuillez patienter...");
        return;
      }
      
      if (isInCooldown()) {
        const remaining = getRemainingCooldownSeconds();
        showMessage("error", `🛡️ ANTI-SPAM : Veuillez patienter ${formatTime(remaining)} avant d'envoyer une nouvelle candidature.`);
        updateCooldownDisplay();
        return;
      }
      
      const pseudo = document.getElementById("pseudo").value.trim();
      const age = document.getElementById("age").value.trim();
      const discord = document.getElementById("discord").value.trim();
      const role = document.getElementById("role").value;
      const pillage = document.getElementById("pillage").value;
      const motivation = document.getElementById("motivation").value.trim();
      
      if (pseudo.length < 2) {
        showMessage("error", "❌ Veuillez entrer un pseudo valide.");
        return;
      }
      
      if (!validateAge(age)) {
        showMessage("error", "❌ L'âge doit être compris entre 10 et 99 ans.");
        return;
      }
      
      if (discord.length < 2) {
        showMessage("error", "❌ Veuillez entrer un pseudo Discord valide.");
        return;
      }
      
      if (!role) {
        showMessage("error", "❌ Veuillez sélectionner un rôle.");
        return;
      }
      
      if (!pillage) {
        showMessage("error", "❌ Veuillez sélectionner une option pour le pillage.");
        return;
      }
      
      if (motivation.length < 10) {
        showMessage("error", "❌ La motivation doit contenir au moins 10 caractères.");
        return;
      }
      
      isSubmitting = true;
      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      submitBtn.textContent = "📤 Envoi en cours...";
      
      const data = {
        embeds: [{
          title: "📩 Nouvelle candidature 10NITE",
          color: 3447003,
          fields: [
            { name: "👤 Pseudo", value: pseudo.substring(0, 256), inline: true },
            { name: "🎂 Âge", value: age, inline: true },
            { name: "💬 Discord", value: discord.substring(0, 100), inline: true },
            { name: "🎮 Rôle", value: role, inline: false },
            { name: "⚔️ Réaction pillage", value: pillage, inline: false },
            { name: "🔥 Motivation", value: motivation.substring(0, 1024), inline: false }
          ],
          footer: {
            text: "🛡️ 10NITE Faction - Anti-spam 60 secondes"
          }
        }]
      };
      
      try {
        const response = await fetch(webhookURL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });
        
        if (response.ok) {
          setLastSubmissionTime();
          showMessage("success", "✅ Candidature envoyée ! Anti-spam : 60 secondes d'attente avant la prochaine.");
          document.getElementById("candidatureForm").reset();
          updateCooldownDisplay();
        } else {
          showMessage("error", "❌ Erreur lors de l'envoi. Réessayez.");
        }
      } catch (error) {
        showMessage("error", "❌ Erreur de connexion.");
      } finally {
        isSubmitting = false;
        if (!isInCooldown()) {
          submitBtn.disabled = false;
          submitBtn.textContent = "📩 Envoyer la candidature";
        }
      }
    }
    
    const form = document.getElementById("candidatureForm");
    form.addEventListener("submit", sendForm);
    
    document.addEventListener("DOMContentLoaded", () => {
      updateCooldownDisplay();
    });
  </script>
</body>
</html>
