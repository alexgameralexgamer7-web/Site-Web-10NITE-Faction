<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recrutement 10NITE Faction</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: #111827;
      padding: 30px;
      border-radius: 15px;
      width: 400px;
      max-width: 100%;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #38bdf8;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      background: #1f2937;
      color: white;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover:not(:disabled) {
      background: #16a34a;
    }
    button:disabled {
      background: #6b7280;
      cursor: not-allowed;
    }
    .timer-text {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #fbbf24;
      display: none;
    }
    .error-message {
      background: #7f1d1d;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
      display: none;
      font-size: 14px;
    }
    .success-message {
      background: #14532d;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
      display: none;
      font-size: 14px;
    }
    .cooldown-bar {
      height: 4px;
      background: #374151;
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }
    .cooldown-progress {
      width: 0%;
      height: 100%;
      background: #22c55e;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>10NITE Faction</h1>
    
    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>
    
    <form id="candidatureForm">
      <label>Pseudo Paladium</label>
      <input id="pseudo" type="text" required>

      <label>Âge</label>
      <input id="age" type="number" min="10" max="99" maxlength="2" required oninput="this.value = this.value.slice(0,2)">

      <label>Discord</label>
      <input id="discord" type="text" placeholder="Pseudo" required>

      <label>Rôle sur Paladium</label>
      <select id="role" required>
        <option value="">-- Choisir --</option>
        <option>Farmeur</option>
        <option>Pilleur</option>
        <option>Builder</option>
      </select>

      <label>Que ferais-tu en cas de pillage sur la base ?</label>
      <select id="pillage" required>
        <option value="">-- Choisir --</option>
        <option>Prévenir le serveur discord puis attaquer le wither et les joueurs</option>
        <option>Attaquer le wither ou les joueurs</option>
      </select>

      <label>Pourquoi rejoindre cette Faction et pas une autre ?</label>
      <textarea id="motivation" required></textarea>

      <button type="submit" id="submitBtn">Envoyer la candidature</button>
      <div id="timerText" class="timer-text"></div>
      <div id="cooldownBar" class="cooldown-bar">
        <div id="cooldownProgress" class="cooldown-progress"></div>
      </div>
    </form>
  </div>

  <script>
    const webhookURL = "https://discord.com/api/webhooks/1490409580910608445/8vmqps_OxmINl7cUFm3UyaEODrg2l_1nc6EwUqUUMWBvai7kme3I4gc0Quj_uvJpgkvs";
    
    // Configuration du cooldown (en secondes)
    const COOLDOWN_SECONDS = 60; // 1 minute d'attente entre chaque candidature
    
    // Clé pour stocker le timestamp du dernier envoi dans localStorage
    const STORAGE_KEY = "10nite_last_submission_time";
    
    let cooldownInterval = null;
    let remainingSeconds = 0;
    let isSubmitting = false;

    // Fonction pour obtenir le timestamp du dernier envoi
    function getLastSubmissionTime() {
      const stored = localStorage.getItem(STORAGE_KEY);
      return stored ? parseInt(stored) : 0;
    }

    // Fonction pour sauvegarder le timestamp du dernier envoi
    function setLastSubmissionTime() {
      localStorage.setItem(STORAGE_KEY, Date.now());
    }

    // Fonction pour vérifier si on est en cooldown
    function isInCooldown() {
      const lastTime = getLastSubmissionTime();
      const now = Date.now();
      return (now - lastTime) < (COOLDOWN_SECONDS * 1000);
    }

    // Fonction pour obtenir le temps restant en secondes
    function getRemainingCooldownSeconds() {
      const lastTime = getLastSubmissionTime();
      const now = Date.now();
      const elapsed = (now - lastTime) / 1000;
      const remaining = Math.max(0, COOLDOWN_SECONDS - elapsed);
      return Math.ceil(remaining);
    }

    // Fonction pour formater le temps (mm:ss)
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // Fonction pour mettre à jour l'interface du cooldown
    function updateCooldownDisplay() {
      const submitBtn = document.getElementById("submitBtn");
      const timerText = document.getElementById("timerText");
      const cooldownBar = document.getElementById("cooldownBar");
      const cooldownProgress = document.getElementById("cooldownProgress");
      
      if (isInCooldown()) {
        const remaining = getRemainingCooldownSeconds();
        const progressPercent = (remaining / COOLDOWN_SECONDS) * 100;
        
        submitBtn.disabled = true;
        timerText.style.display = "block";
        cooldownBar.style.display = "block";
        timerText.innerHTML = `⏳ Veuillez patienter ${formatTime(remaining)} avant une nouvelle candidature ⏳`;
        cooldownProgress.style.width = `${100 - progressPercent}%`;
        
        remainingSeconds = remaining;
        
        // Démarrer le compte à rebours si pas déjà en cours
        if (!cooldownInterval) {
          cooldownInterval = setInterval(() => {
            if (remainingSeconds <= 1) {
              // Fin du cooldown
              clearInterval(cooldownInterval);
              cooldownInterval = null;
              submitBtn.disabled = false;
              timerText.style.display = "none";
              cooldownBar.style.display = "none";
            } else {
              remainingSeconds--;
              const newProgress = (remainingSeconds / COOLDOWN_SECONDS) * 100;
              timerText.innerHTML = `⏳ Veuillez patienter ${formatTime(remainingSeconds)} avant une nouvelle candidature ⏳`;
              cooldownProgress.style.width = `${100 - newProgress}%`;
            }
          }, 1000);
        }
      } else {
        submitBtn.disabled = false;
        timerText.style.display = "none";
        cooldownBar.style.display = "none";
        if (cooldownInterval) {
          clearInterval(cooldownInterval);
          cooldownInterval = null;
        }
      }
    }

    // Fonction pour afficher un message temporaire
    function showMessage(type, text) {
      const errorDiv = document.getElementById("errorMessage");
      const successDiv = document.getElementById("successMessage");
      
      // Cacher les deux
      errorDiv.style.display = "none";
      successDiv.style.display = "none";
      
      if (type === "error") {
        errorDiv.innerHTML = text;
        errorDiv.style.display = "block";
      } else if (type === "success") {
        successDiv.innerHTML = text;
        successDiv.style.display = "block";
      }
      
      // Auto-cacher après 5 secondes
      setTimeout(() => {
        if (type === "error") {
          errorDiv.style.display = "none";
        } else {
          successDiv.style.display = "none";
        }
      }, 5000);
    }

    // Fonction pour valider l'âge
    function validateAge(age) {
      const ageNum = parseInt(age);
      if (isNaN(ageNum) || ageNum < 10 || ageNum > 99) {
        return false;
      }
      return true;
    }

    // Fonction pour valider le pseudo Discord (minimum 2 caractères)
    function validateDiscord(discord) {
      return discord && discord.trim().length >= 2;
    }

    // Fonction pour valider le pseudo
    function validatePseudo(pseudo) {
      return pseudo && pseudo.trim().length >= 2;
    }

    // Fonction pour envoyer le formulaire avec anti-spam
    async function sendForm(event) {
      event.preventDefault();
      
      // Vérifier si déjà en cours d'envoi
      if (isSubmitting) {
        showMessage("error", "⏳ Envoi en cours, veuillez patienter...");
        return;
      }
      
      // Vérifier le cooldown
      if (isInCooldown()) {
        const remaining = getRemainingCooldownSeconds();
        showMessage("error", `⚠️ Veuillez patienter ${formatTime(remaining)} avant d'envoyer une nouvelle candidature. ⚠️`);
        updateCooldownDisplay();
        return;
      }
      
      // Récupérer les valeurs
      const pseudo = document.getElementById("pseudo").value.trim();
      const age = document.getElementById("age").value.trim();
      const discord = document.getElementById("discord").value.trim();
      const role = document.getElementById("role").value;
      const pillage = document.getElementById("pillage").value;
      const motivation = document.getElementById("motivation").value.trim();
      
      // Validation côté client
      if (!validatePseudo(pseudo)) {
        showMessage("error", "❌ Veuillez entrer un pseudo valide (au moins 2 caractères).");
        return;
      }
      
      if (!validateAge(age)) {
        showMessage("error", "❌ L'âge doit être compris entre 10 et 99 ans.");
        return;
      }
      
      if (!validateDiscord(discord)) {
        showMessage("error", "❌ Veuillez entrer un pseudo Discord valide.");
        return;
      }
      
      if (!role) {
        showMessage("error", "❌ Veuillez sélectionner un rôle.");
        return;
      }
      
      if (!pillage) {
        showMessage("error", "❌ Veuillez sélectionner une option pour le pillage.");
        return;
      }
      
      if (motivation.length < 10) {
        showMessage("error", "❌ La motivation doit contenir au moins 10 caractères.");
        return;
      }
      
      if (motivation.length > 1000) {
        showMessage("error", "❌ La motivation ne peut pas dépasser 1000 caractères.");
        return;
      }
      
      isSubmitting = true;
      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      submitBtn.textContent = "📤 Envoi en cours...";
      
      const data = {
        embeds: [{
          title: "📩 Nouvelle candidature 10NITE",
          color: 3447003,
          fields: [
            { name: "👤 Pseudo", value: pseudo.substring(0, 256), inline: true },
            { name: "🎂 Âge", value: age, inline: true },
            { name: "💬 Discord", value: discord.substring(0, 100), inline: true },
            { name: "🎮 Rôle", value: role, inline: false },
            { name: "⚔️ Réaction en cas de pillage", value: pillage, inline: false },
            { name: "🔥 Motivation", value: motivation.substring(0, 1024), inline: false }
          ],
          footer: {
            text: "10NITE Faction Recrutement - " + new Date().toLocaleString()
          }
        }]
      };
      
      try {
        const response = await fetch(webhookURL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });
        
        if (response.ok) {
          // Succès : sauvegarder le timestamp et démarrer le cooldown
          setLastSubmissionTime();
          showMessage("success", "✅ Candidature envoyée avec succès ! Vous pourrez en envoyer une nouvelle dans " + COOLDOWN_SECONDS + " secondes.");
          
          // Réinitialiser le formulaire
          document.getElementById("candidatureForm").reset();
          
          // Mettre à jour l'affichage du cooldown
          updateCooldownDisplay();
        } else {
          const errorText = await response.text();
          console.error("Erreur webhook:", errorText);
          showMessage("error", "❌ Erreur lors de l'envoi à Discord. Code: " + response.status);
        }
      } catch (error) {
        console.error("Erreur réseau:", error);
        showMessage("error", "❌ Erreur de connexion. Vérifiez votre réseau.");
      } finally {
        isSubmitting = false;
        submitBtn.disabled = isInCooldown();
        submitBtn.textContent = "Envoyer la candidature";
      }
    }
    
    // Attacher l'événement au formulaire
    const form = document.getElementById("candidatureForm");
    form.addEventListener("submit", sendForm);
    
    // Vérifier l'état du cooldown au chargement de la page
    document.addEventListener("DOMContentLoaded", () => {
      updateCooldownDisplay();
    });
    
    // Sauvegarde des données du formulaire en cas de rafraîchissement (optionnel)
    function saveFormData() {
      const formData = {
        pseudo: document.getElementById("pseudo").value,
        age: document.getElementById("age").value,
        discord: document.getElementById("discord").value,
        role: document.getElementById("role").value,
        pillage: document.getElementById("pillage").value,
        motivation: document.getElementById("motivation").value
      };
      localStorage.setItem("10nite_form_backup", JSON.stringify(formData));
    }
    
    function restoreFormData() {
      const saved = localStorage.getItem("10nite_form_backup");
      if (saved) {
        try {
          const data = JSON.parse(saved);
          if (data.pseudo) document.getElementById("pseudo").value = data.pseudo;
          if (data.age) document.getElementById("age").value = data.age;
          if (data.discord) document.getElementById("discord").value = data.discord;
          if (data.role) document.getElementById("role").value = data.role;
          if (data.pillage) document.getElementById("pillage").value = data.pillage;
          if (data.motivation) document.getElementById("motivation").value = data.motivation;
        } catch(e) {}
      }
    }
    
    // Sauvegarder automatiquement les données
    const inputs = ["pseudo", "age", "discord", "role", "pillage", "motivation"];
    inputs.forEach(id => {
      const element = document.getElementById(id);
      if (element) {
        element.addEventListener("input", saveFormData);
        element.addEventListener("change", saveFormData);
      }
    });
    
    restoreFormData();
  </script>
</body>
</html>
